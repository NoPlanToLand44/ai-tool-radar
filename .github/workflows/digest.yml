name: Daily AI Tools Digest

on:
  schedule:
    # 06:00 UTC = 09:00 Sofia (DST) / 08:00 Sofia (winter)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print to logs instead of sending email'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST_TO: ${{ vars.DIGEST_TO || 'emil.shupev@gmail.com' }}
          DIGEST_FROM: ${{ vars.DIGEST_FROM || 'AI Tool Radar <onboarding@resend.dev>' }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '0' }}
        run: python main.py

      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen.json digests/
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "chore: digest $(date -u +%Y-%m-%d)"
            git push
          fi
